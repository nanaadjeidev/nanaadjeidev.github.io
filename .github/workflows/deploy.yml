name: Build & Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sneakyofficial.com
        uses: actions/checkout@v4
        with:
          repository: Sneakynarnar/sneakyofficial.com

      - name: Strip to portfolio page only
        run: |
          cat > src/frontend/app/App.tsx << 'EOF'
          import DevPortfolio from "./pages/DevPortfolio";
          function App() { return <DevPortfolio />; }
          export default App;
          EOF

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Build
        run: npm run build
        working-directory: src/frontend

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
